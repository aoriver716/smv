name: Bug report
description: Something in the web app behaves wrong.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: The hash route where the bug appears, if applicable.
      placeholder: "e.g. #/psalm/119/p3"
  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: "e.g. Firefox 128 on Windows 11; Safari on iOS 17"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open #/
        2. Click...
        3. Observe...
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste any errors from the browser developer console.
      render: text
